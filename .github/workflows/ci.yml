name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: sdk-py (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk-py/pyproject.toml
      - run: pip install -e '.[dev]'
        working-directory: sdk-py
      - run: ruff check src tests
        working-directory: sdk-py
      - run: pytest -q
        working-directory: sdk-py

  rust:
    name: router-rs
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: router-rs } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: router-rs }
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-features

  typescript:
    name: sdk-ts + mcp-server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk-ts, mcp-server]
    defaults: { run: { working-directory: ${{ matrix.package }} } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "${{ matrix.package }}/package-lock.json" }
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
